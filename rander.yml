services:
  - type: worker
    name: YUKIWAFUS
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m YUKIWAFUS
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URL
        sync: false
      - key: OWNER_ID
        sync: false
      - key: SUDO_USERS
        sync: false
      - key: LOG_CHANNEL
        sync: false
      - key: SUPPORT_CHAT
        sync: false
      - key: CHARA_CHANNEL_ID
        sync: false
        
